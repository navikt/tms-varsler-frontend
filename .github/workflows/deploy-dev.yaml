name: "Deploy dev"
on: workflow_dispatch

permissions:
  contents: "read"
  id-token: "write"
  packages: "write"

jobs:
  build:
    name: "build"
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false # Recommended if using actions/setup-node for caching
      - uses: "actions/setup-node@v4"
        with:
          node-version: 24
          registry-url: "https://npm.pkg.github.com"
          cache: "pnpm"

      - name: "Install dependencies"
        run: "pnpm install --config.minimum-release-age=10080 --frozen-lockfile"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}

      - name: "Run unit and component tests"
        run: "pnpm test"

      - name: "Install Playwright browsers"
        run: "pnpm exec playwright install --with-deps chromium"

      - name: "Run E2E tests"
        run: "pnpm test:e2e"

      - name: "Build application"
        run: "pnpm run build"
        env:
          PUBLIC_APP_ENVIRONMENT: dev
          ASTRO_KEY: ${{ secrets.ASTRO_KEY }}

      - name: "Upload to cdn"
        uses: nais/deploy/actions/cdn-upload/v2@master
        with:
          team: min-side
          source: ./dist/client/_astro
          destination: 'tms-varsler-frontend'

      - name: "Build and push"
        uses: nais/docker-build-push@v0
        id: docker-build-push
        with:
          team: min-side

    outputs:
      image: ${{ steps.docker-build-push.outputs.image }}

  deploy-dev:
    runs-on: "ubuntu-latest"
    needs: "build"
    strategy:
      matrix:
        cluster: [ dev-gcp ]
    steps:
      - uses: "actions/checkout@v4"
      - name: "Deploy to dev"
        uses: "nais/deploy/actions/deploy@v2"
        env:
          CLUSTER: ${{ matrix.cluster }}
          RESOURCE: nais/${{ matrix.cluster }}/nais.yaml
          VAR: image=${{ needs.build.outputs.image }},version=${{ github.sha }}
