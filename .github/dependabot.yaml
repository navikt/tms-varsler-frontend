version: 2
registries:
  npm-github:
    type: npm-registry
    url: https://npm.pkg.github.com
    token: ${{ secrets.READER_TOKEN }}
updates:
  - package-ecosystem: "npm"
    directory: "/"
    registries: "*"
    schedule:
      interval: "daily"
      time: "08:00"
      timezone: "Europe/Oslo"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
    groups:
      navikt:
        patterns:
          - "@navikt/*"
      astro:
        patterns:
          - "astro"
          - "@astrojs/*"
      minor-and-patch:
        update-types:
          - "patch"
          - "minor"
        exclude-patterns:
          - "@navikt/ds-*" # midlertidig ekskludering av ds-oppdateringer inntil vi får inn ds-css